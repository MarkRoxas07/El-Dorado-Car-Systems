    <script>
        function checkAuth() {
            const session = localStorage.getItem('userSession') || sessionStorage.getItem('userSession');
            if (!session) {
                window.location.href = 'index.html';
                return null;
            }
            return JSON.parse(session);
        }

        const currentUser = checkAuth();

        function getRoleDisplayName(role) {
            const roles = { admin: 'Administrator', inventory_clerk: 'Inventory Clerk', loa: 'LOA - Cashier' };
            return roles[role] || role;
        }

        // Get system statistics
        function getSystemStats() {
            const products = JSON.parse(localStorage.getItem('eldorado_products') || '[]');
            const users = JSON.parse(localStorage.getItem('eldorado_users') || '[]');
            const sales = JSON.parse(localStorage.getItem('eldorado_sales') || '[]');
            const audit = JSON.parse(localStorage.getItem('eldorado_audit') || '[]');
            
            const totalRevenue = sales.reduce((sum, s) => sum + s.total, 0);
            const totalProductsSold = sales.reduce((sum, s) => sum + s.items.reduce((itemSum, item) => itemSum + item.quantity, 0), 0);
            
            return {
                totalProducts: products.length,
                totalUsers: users.length,
                totalSales: sales.length,
                totalRevenue: totalRevenue,
                totalProductsSold: totalProductsSold,
                totalAuditLogs: audit.length
            };
        }

                function renderNavigation() {
            const navSections = [
                {
                    title: "MAIN",
                    items: [
                        { id: 'dashboard', label: 'Dashboard', icon: 'fas fa-chart-line' },
                        { id: 'inventory', label: 'Inventory', icon: 'fas fa-boxes' },
                        { id: 'sales', label: 'Sales', icon: 'fas fa-shopping-cart' },
                        { id: 'search', label: 'Search', icon: 'fas fa-search' }
                    ]
                },
                {
                    title: "MANAGEMENT",
                    items: [
                        { id: 'users', label: 'Users', icon: 'fas fa-users' },
                        { id: 'reports', label: 'Reports', icon: 'fas fa-chart-bar' },
                        { id: 'audit', label: 'Audit Logs', icon: 'fas fa-file-alt' }
                    ]
                },
                {
                    title: "SYSTEM",
                    items: [
                        { id: 'maintenance', label: 'Maintenance', icon: 'fas fa-tools' },
                        { id: 'help', label: 'Support', icon: 'fas fa-question-circle' },
                        { id: 'about', label: 'About', icon: 'fas fa-info-circle' }
                    ]
                }
            ];
            
            let navHtml = '';
            for (const section of navSections) {
                navHtml += `<div class="nav-section-title">${section.title}</div>`;
                for (const item of section.items) {
                    navHtml += `
                        <button class="nav-item ${item.id === 'about' ? 'active' : ''}" onclick="navigateTo('${item.id}')">
                            <i class="${item.icon}" style="width: 1.25rem;"></i>
                            <span>${item.label}</span>
                        </button>
                    `;
                }
            }
            document.getElementById('navLinks').innerHTML = navHtml;
        }

        function navigateTo(module) {
            const pages = {
                dashboard: 'dashboard.html', inventory: 'inventory.html', sales: 'sales.html',
                users: 'users.html', reports: 'reports.html', audit: 'audit.html',
                search: 'search.html', maintenance: 'maintenance.html', help: 'help.html', about: 'about.html'
            };
            if (pages[module]) window.location.href = pages[module];

                                        <li class="mt-2"><i class="fas fa-check-circle" style="color: var(--color-green);"></i> Sales Transaction Processing</li>
                                        <li class="mt-2"><i class="fas fa-check-circle" style="color: var(--color-green);"></i> User Role Management (Admin/Clerk/LOA)</li>
                                        <li class="mt-2"><i class="fas fa-check-circle" style="color: var(--color-green);"></i> Comprehensive Reporting & Analytics</li>

            document.getElementById('mainContent').innerHTML = html;
        }

        function toggleSidebar() {
            sidebarOpen = !sidebarOpen;
            const sidebar = document.getElementById('sidebar');
            const main = document.querySelector('main');
            if (sidebarOpen) {
                sidebar.classList.remove('sidebar-closed');
                main.classList.remove('sidebar-closed');
            } else {
                sidebar.classList.add('sidebar-closed');
                main.classList.add('sidebar-closed');
            }
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('darkMode', isDark);
            const icon = document.querySelector('#darkModeToggle i');
            icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('userSession');
                sessionStorage.removeItem('userSession');
                window.location.href = 'index.html';
            }
        }

        let sidebarOpen = true;

        // Initialize
        if (currentUser) {
            document.getElementById('userName').innerText = currentUser?.fullName || 'User';
            document.getElementById('userRole').innerText = getRoleDisplayName(currentUser?.role);
        }
        
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark');
            document.querySelector('#darkModeToggle i').className = 'fas fa-sun';
        }
        
        renderNavigation();
        renderAbout();
        
        document.getElementById('sidebarToggleBtn').addEventListener('click', toggleSidebar);
        document.getElementById('darkModeToggle').addEventListener('click', toggleDarkMode);
        document.getElementById('logoutBtn').addEventListener('click', logout);
        
        window.navigateTo = navigateTo;
    </script>
</body>
